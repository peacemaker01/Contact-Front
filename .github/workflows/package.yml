name: Package Contact Front

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags: ['v*']

jobs:
  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Linux needs a display/headless libs for JavaFX; ensure runtime deps are present.
      - name: Install Linux packages
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      - name: Package (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: pwsh package/package_app.ps1

      - name: Package (POSIX)
        if: matrix.platform != 'win'
        run: bash package/package_app.sh

      - name: Upload app image
        uses: actions/upload-artifact@v4
        with:
          name: contact-front-${{ matrix.platform }}
          path: dist/*
          retention-days: 14
